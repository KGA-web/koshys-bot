<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koshys AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --maroon: #7B1A1A; --maroon-dark: #5A1212; --maroon-light: #A02424;
  --gold: #C9A84C; --gold-light: #E8CC80; --gold-pale: #FDF6E3;
  --cream: #FEFAF4; --text: #1C1C1C; --text-muted: #6B6B6B;
  --border: #E5D9C5; --bubble-bot: #F8F2E8; --white: #FFFFFF;
  --font-display: 'Playfair Display', Georgia, serif;
  --font-body: 'DM Sans', sans-serif;
}
body { font-family: var(--font-body); background: linear-gradient(135deg,#f8f2e8,#fdf6e3,#f5ede0); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:16px; }

.chat-widget { background:white; border-radius:20px; overflow:hidden; box-shadow:0 20px 60px rgba(123,26,26,0.15); border:1px solid var(--border); display:flex; flex-direction:column; width:420px; height:700px; }

/* Header */
.chat-header { background:var(--maroon); padding:16px 18px; display:flex; align-items:center; gap:12px; }
.avatar { width:42px; height:42px; border-radius:50%; background:var(--gold); display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:700; color:white; font-family:var(--font-display); flex-shrink:0; border:2px solid var(--gold-light); }
.header-info { flex:1; }
.header-info h3 { font-family:var(--font-display); font-size:15px; color:white; font-weight:600; }
.status-dot { display:flex; align-items:center; gap:5px; margin-top:2px; }
.dot { width:7px; height:7px; background:#4ADE80; border-radius:50%; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.status-dot span { font-size:11px; color:rgba(255,255,255,0.7); }
.clear-btn { width:30px; height:30px; border-radius:50%; background:rgba(255,255,255,0.15); border:none; cursor:pointer; color:white; font-size:14px; display:flex; align-items:center; justify-content:center; }
.clear-btn:hover { background:rgba(255,255,255,0.25); }

/* Quick chips */
.quick-chips { padding:10px 14px; background:var(--cream); border-bottom:1px solid var(--border); display:flex; gap:6px; flex-wrap:wrap; }
.chip { background:white; border:1px solid var(--border); border-radius:20px; padding:4px 10px; font-size:11px; font-weight:500; color:var(--maroon); cursor:pointer; white-space:nowrap; transition:all 0.15s; }
.chip:hover { background:var(--maroon); color:white; border-color:var(--maroon); }

/* Messages */
.messages-area { flex:1; overflow-y:auto; padding:16px 14px; display:flex; flex-direction:column; gap:12px; background:white; }
.messages-area::-webkit-scrollbar { width:3px; }
.messages-area::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
.msg-row { display:flex; gap:8px; align-items:flex-end; }
.msg-row.user { flex-direction:row-reverse; }
.msg-avatar { width:28px; height:28px; border-radius:50%; background:var(--maroon); display:flex; align-items:center; justify-content:center; font-size:12px; color:var(--gold-light); font-weight:600; flex-shrink:0; font-family:var(--font-display); }
.msg-avatar.user-av { background:var(--gold); color:var(--maroon-dark); }
.bubble { max-width:80%; padding:10px 14px; border-radius:16px; font-size:13.5px; line-height:1.55; }
.bubble.bot { background:var(--bubble-bot); color:var(--text); border-bottom-left-radius:4px; border:1px solid var(--border); }
.bubble.user { background:var(--maroon); color:white; border-bottom-right-radius:4px; }
.bubble-time { font-size:10px; color:var(--text-muted); margin-top:3px; }
.msg-wrap { display:flex; flex-direction:column; max-width:80%; }
.msg-wrap.right { align-items:flex-end; }
.typing-indicator { display:flex; gap:4px; padding:10px 14px; }
.typing-dot { width:7px; height:7px; border-radius:50%; background:var(--gold); animation:typing 1.2s infinite; }
.typing-dot:nth-child(2) { animation-delay:0.2s; }
.typing-dot:nth-child(3) { animation-delay:0.4s; }
@keyframes typing { 0%,80%,100%{transform:scale(0.7);opacity:0.5} 40%{transform:scale(1);opacity:1} }

/* Lead capture form inside chat */
.lead-form-bubble { background:var(--gold-pale); border:1px solid var(--gold); border-radius:16px; padding:16px; max-width:90%; }
.lead-form-bubble h4 { font-family:var(--font-display); font-size:14px; color:var(--maroon-dark); margin-bottom:4px; }
.lead-form-bubble p { font-size:12px; color:var(--text-muted); margin-bottom:12px; }
.lead-field { margin-bottom:10px; }
.lead-field label { display:block; font-size:11px; font-weight:600; color:var(--maroon); margin-bottom:4px; text-transform:uppercase; letter-spacing:0.04em; }
.lead-field input, .lead-field select { width:100%; padding:8px 12px; border:1px solid var(--border); border-radius:8px; font-size:13px; font-family:var(--font-body); color:var(--text); background:white; outline:none; transition:border-color 0.2s; }
.lead-field input:focus, .lead-field select:focus { border-color:var(--maroon); }
.lead-field select { cursor:pointer; }
.radio-group { display:flex; gap:12px; margin-top:4px; }
.radio-group label { display:flex; align-items:center; gap:5px; font-size:13px; color:var(--text); cursor:pointer; font-weight:400; }
.radio-group input[type=radio] { accent-color:var(--maroon); width:14px; height:14px; }
.submit-lead-btn { width:100%; background:var(--maroon); color:white; border:none; border-radius:10px; padding:10px; font-size:13px; font-weight:600; cursor:pointer; font-family:var(--font-body); margin-top:4px; transition:background 0.2s; }
.submit-lead-btn:hover { background:var(--maroon-light); }

/* Input area */
.input-area { padding:12px 14px; background:var(--cream); border-top:1px solid var(--border); display:flex; align-items:center; gap:8px; }
.input-box { flex:1; background:white; border:1px solid var(--border); border-radius:22px; padding:9px 16px; font-size:13.5px; font-family:var(--font-body); outline:none; resize:none; height:40px; line-height:1.4; color:var(--text); transition:border-color 0.2s; }
.input-box::placeholder { color:#AAA; }
.input-box:focus { border-color:var(--maroon); }
.mic-btn { width:40px; height:40px; border-radius:50%; background:white; border:1px solid var(--border); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:16px; transition:all 0.2s; flex-shrink:0; color:var(--text-muted); }
.mic-btn:hover { border-color:var(--maroon); color:var(--maroon); }
.mic-btn.recording { background:var(--maroon); border-color:var(--maroon); color:white; animation:mic-pulse 1s infinite; }
@keyframes mic-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(123,26,26,0.4)} 50%{box-shadow:0 0 0 8px rgba(123,26,26,0)} }
.send-btn { width:40px; height:40px; border-radius:50%; background:var(--maroon); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:16px; color:white; transition:background 0.2s,transform 0.1s; flex-shrink:0; }
.send-btn:hover { background:var(--maroon-light); }
.send-btn:active { transform:scale(0.93); }

/* Success toast */
.toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#166534; color:white; padding:10px 20px; border-radius:10px; font-size:13px; font-weight:500; opacity:0; transition:opacity 0.3s; pointer-events:none; z-index:999; }
.toast.show { opacity:1; }
</style>
</head>
<body>

<!-- ⬇ IMPORTANT: Replace this URL with your actual backend URL from Render.com -->
<script>const BACKEND_URL = "https://koshys-bot-adx5.vercel.app/";</script>

<div class="chat-widget">
  <div class="chat-header">
    <div class="avatar">K</div>
    <div class="header-info">
      <h3>KAIA — Koshys AI Assistant</h3>
      <div class="status-dot"><div class="dot"></div><span>Online · Always here to help</span></div>
    </div>
    <button class="clear-btn" onclick="clearChat()" title="Clear chat">🗑️</button>
  </div>

  <div class="quick-chips">
    <button class="chip" onclick="sendChip('Courses & Programs')">📚 Courses</button>
    <button class="chip" onclick="sendChip('Admission Process')">🎓 Admissions</button>
    <button class="chip" onclick="sendChip('Fee Structure')">💰 Fees</button>
    <button class="chip" onclick="sendChip('Campus & Facilities')">🏫 Campus</button>
    <button class="chip" onclick="sendChip('Placements')">💼 Placements</button>
  </div>

  <div class="messages-area" id="messagesArea"></div>

  <div class="input-area">
    <textarea class="input-box" id="userInput" placeholder="Ask about courses, fees, admissions..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="mic-btn" id="micBtn" onclick="startVoiceInput()">🎤</button>
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<div class="toast" id="toast">✅ Details saved to Google Sheets!</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
// Replace with your Google Apps Script Web App URL (Step 2 in the guide)
const SHEETS_URL = "https://script.google.com/macros/s/AKfycbwu65Z6gDG7WUj-vx1cv-O2Fx6hYxuHEkBhlL6h-tRlR2CAvt4dp8cXJq0xxp1LjY7BlQ/exec";

const KOSHYS_KNOWLEDGE = `You are KAIA, the friendly AI assistant for Koshys Group of Institutions, Bangalore.
Answer questions about admissions, courses, fees, campus, placements, hostel, clubs.
Courses: B.Com, BBA, BCA, BA, B.Sc, MBA, M.Com, MCA, PUC (Science/Commerce/Arts).
Fees: UG Rs 25,000–55,000/yr, PG Rs 60,000–1,00,000/yr, PU Rs 15,000–30,000/yr.
Admissions open June each year. Apply at www.koshys.edu.in or call +91-80-XXXXXXXX.
Scholarships available for merit and financially weaker students.
For contact: admissions@koshys.edu.in or info@koshys.edu.in.
Respond warmly and end with "Is there anything else I can help you with?"
Keep answers short (2–4 sentences). If unsure, direct to the admissions office.`;

let chatHistory = [];
let isBotTyping = false;
let leadCollected = false;
let messageCount = 0;

// ── INIT ─────────────────────────────────────────────────────────────────────
window.onload = () => {
  appendBotMessage("Namaskara! 🙏 I'm KAIA, your Koshys AI assistant. How can I help you today? Ask me about courses, admissions, fees, or campus life!");
};

// ── SEND MESSAGE ─────────────────────────────────────────────────────────────
async function sendMessage(text) {
  const input = document.getElementById('userInput');
  const userText = text || input.value.trim();
  if (!userText || isBotTyping) return;
  if (!text) { input.value = ''; input.style.height = 'auto'; }

  appendUserMessage(userText);
  chatHistory.push({ role: 'user', content: userText });
  messageCount++;

  // Show lead form after 2nd message if not yet collected
  if (messageCount === 2 && !leadCollected) {
    setTimeout(() => showLeadForm(), 600);
  }

  showTyping();
  isBotTyping = true;

  try {
    const res = await fetch(`${BACKEND_URL}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: userText, history: chatHistory })
    });
    const data = await res.json();
    const reply = data.reply || "I'm sorry, something went wrong. Please contact us at info@koshys.edu.in.";
    removeTyping();
    appendBotMessage(reply);
    chatHistory.push({ role: 'assistant', content: reply });
  } catch {
    removeTyping();
    appendBotMessage("I'm having a technical issue. Please contact Koshys at info@koshys.edu.in or +91-80-XXXXXXXX.");
  }

  isBotTyping = false;
}

// ── MESSAGES ─────────────────────────────────────────────────────────────────
function appendUserMessage(text) {
  const area = document.getElementById('messagesArea');
  const now = new Date().toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' });
  const row = document.createElement('div');
  row.className = 'msg-row user';
  row.innerHTML = `
    <div class="msg-wrap right">
      <div class="bubble user">${escHtml(text)}</div>
      <div class="bubble-time" style="text-align:right">${now}</div>
    </div>
    <div class="msg-avatar user-av">U</div>`;
  area.appendChild(row);
  area.scrollTop = area.scrollHeight;
}

function appendBotMessage(text) {
  const area = document.getElementById('messagesArea');
  const now = new Date().toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' });
  const row = document.createElement('div');
  row.className = 'msg-row';
  row.innerHTML = `
    <div class="msg-avatar">K</div>
    <div class="msg-wrap">
      <div class="bubble bot">${text.replace(/\n/g,'<br>')}</div>
      <div class="bubble-time">${now}</div>
    </div>`;
  area.appendChild(row);
  area.scrollTop = area.scrollHeight;
}

function showTyping() {
  const area = document.getElementById('messagesArea');
  const div = document.createElement('div');
  div.className = 'msg-row'; div.id = 'typingRow';
  div.innerHTML = `<div class="msg-avatar">K</div><div class="bubble bot"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function removeTyping() { document.getElementById('typingRow')?.remove(); }

// ── LEAD CAPTURE FORM ─────────────────────────────────────────────────────────
function showLeadForm() {
  const area = document.getElementById('messagesArea');
  const row = document.createElement('div');
  row.className = 'msg-row';
  row.id = 'leadFormRow';
  row.innerHTML = `
    <div class="msg-avatar">K</div>
    <div class="lead-form-bubble">
      <h4>📋 Quick Registration</h4>
      <p>Share your details so our team can follow up with you personally!</p>
      <div class="lead-field">
        <label>Your Name *</label>
        <input type="text" id="lf-name" placeholder="Enter your full name" required>
      </div>
      <div class="lead-field">
        <label>You are a *</label>
        <div class="radio-group">
          <label><input type="radio" name="lf-type" value="Student" checked> Student</label>
          <label><input type="radio" name="lf-type" value="Parent"> Parent</label>
          <label><input type="radio" name="lf-type" value="Other"> Other</label>
        </div>
      </div>
      <div class="lead-field">
        <label>Mobile Number *</label>
        <input type="tel" id="lf-mobile" placeholder="+91 XXXXXXXXXX" maxlength="15" required>
      </div>
      <div class="lead-field">
        <label>Course Interested In</label>
        <select id="lf-course">
          <option value="">-- Select a course --</option>
          <optgroup label="Pre-University (PUC)">
            <option>PUC Science</option>
            <option>PUC Commerce</option>
            <option>PUC Arts</option>
          </optgroup>
          <optgroup label="Undergraduate (UG)">
            <option>B.Com</option>
            <option>BBA</option>
            <option>BCA</option>
            <option>BA</option>
            <option>B.Sc</option>
          </optgroup>
          <optgroup label="Postgraduate (PG)">
            <option>MBA</option>
            <option>M.Com</option>
            <option>MCA</option>
          </optgroup>
          <option value="Not decided yet">Not decided yet</option>
        </select>
      </div>
      <button class="submit-lead-btn" onclick="submitLead()">Submit Details →</button>
    </div>`;
  area.appendChild(row);
  area.scrollTop = area.scrollHeight;
}

async function submitLead() {
  const name   = document.getElementById('lf-name').value.trim();
  const type   = document.querySelector('input[name="lf-type"]:checked')?.value || 'Student';
  const mobile = document.getElementById('lf-mobile').value.trim();
  const course = document.getElementById('lf-course').value || 'Not specified';

  if (!name) { alert('Please enter your name.'); return; }
  if (!mobile || mobile.length < 10) { alert('Please enter a valid mobile number.'); return; }

  const submitBtn = document.querySelector('.submit-lead-btn');
  submitBtn.textContent = 'Saving...';
  submitBtn.disabled = true;

  const leadData = {
    name, type, mobile, course,
    timestamp: new Date().toLocaleString('en-IN'),
    source: 'Website Chatbot'
  };

  try {
    await fetch(SHEETS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(leadData)
    });
    leadCollected = true;
    document.getElementById('leadFormRow').remove();
    appendBotMessage(`Thank you, ${name}! 🎉 Your details have been saved. Our admissions team will contact you on ${mobile} shortly. In the meantime, feel free to ask me anything about Koshys!`);
    showToast();
  } catch {
    submitBtn.textContent = 'Submit Details →';
    submitBtn.disabled = false;
    appendBotMessage('Sorry, there was an issue saving your details. Please call us at +91-80-XXXXXXXX directly.');
  }
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function sendChip(topic) { sendMessage(topic); }
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 100) + 'px'; }
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function clearChat() {
  chatHistory = []; messageCount = 0; leadCollected = false;
  document.getElementById('messagesArea').innerHTML = '';
  appendBotMessage("Chat cleared! How can I help you today? 😊");
}

function startVoiceInput() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) { alert('Voice input needs Chrome or Edge browser.'); return; }
  const rec = new SpeechRecognition();
  rec.lang = 'en-IN'; rec.interimResults = false;
  const micBtn = document.getElementById('micBtn');
  micBtn.classList.add('recording'); micBtn.textContent = '⏹';
  rec.start();
  rec.onresult = (e) => { document.getElementById('userInput').value = e.results[0][0].transcript; sendMessage(); };
  rec.onend = () => { micBtn.classList.remove('recording'); micBtn.textContent = '🎤'; };
}
</script>
</body>
</html>
